name: Cloud PC + Web View HTML5 Portal

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:
        description: "Runtime in minutes"
        required: false
        default: "355"

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

jobs:
  desktop:
    runs-on: windows-latest
    timeout-minutes: 370
    steps:
      - name: Optimize System and Configure Network Firewall
        run: |
          Set-NetFirewallProfile -Profile Public,Private,Domain -Enabled False
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Start-Service -Name "TermService" -ErrorAction SilentlyContinue

      - name: Deploy Native Web-Streaming Engine
        run: |
          Write-Host "Installing TightVNC Server via Chocolatey..."
          choco install tightvnc -y --no-progress
          
          Write-Host "Injecting custom access keys directly into Registry..."
          # Pre-configuring 'Pass1234' hex keys into the Windows registry so it skips interactive password setup
          $regPath = "HKLM:\SOFTWARE\TightVNC\Server"
          if (-not (Test-Path $regPath)) { New-Item -Path $regPath -Force | Out-Null }
          
          # Pass1234 obfuscated hex values for primary authentication
          Set-ItemProperty -Path $regPath -Name "Password" -Value ([byte[]](0x2f,0x67,0x22,0x26,0x3e,0x28,0x2f,0x3c)) -PropertyType Binary -Force
          Set-ItemProperty -Path $regPath -Name "ControlPassword" -Value ([byte[]](0x2f,0x67,0x22,0x26,0x3e,0x28,0x2f,0x3c)) -PropertyType Binary -Force
          
          # Force the internal web portal engine to turn on
          Set-ItemProperty -Path $regPath -Name "HttpPort" -Value 5800 -PropertyType DWord -Force
          Set-ItemProperty -Path $regPath -Name "EnableHttpServer" -Value 1 -PropertyType DWord -Force
          Set-ItemProperty -Path $regPath -Name "RfbPort" -Value 5900 -PropertyType DWord -Force

          Write-Host "Booting native display server..."
          $vncPath = "${env:ProgramFiles}\TightVNC\tvncserver.exe"
          Start-Process -FilePath $vncPath -ArgumentList "-run" -NoNewWindow
          Start-Sleep -Seconds 10

      - name: Deploy Ngrok Public Web Tunnel
        env:
          NGROK_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
        run: |
          Write-Host "Deploying proxy network infrastructure..."
          choco install ngrok -y --no-progress
          ngrok config add-authtoken $NGROK_TOKEN
          
          Write-Host "Spawning HTTP tunnel directly to Native Port 5800..."
          # Exposes the built-in HTML5 viewer out to the web securely
          Start-Process ngrok -ArgumentList "http 5800" -NoNewWindow
          Start-Sleep -Seconds 10

      - name: Generate Direct Mobile Access Dashboard
        run: |
          $uri = "http://127.0.0.1:4040/api/tunnels"
          for ($i = 1; $i -le 6; $i++) {
              try {
                  $tunnels = Invoke-RestMethod -Uri $uri
                  $publicUrl = $tunnels.tunnels[0].public_url
                  if ($publicUrl) {
                      $Esc = [char]27
                      Write-Host "`n${Esc}[36m###########################################################################${Esc}[0m"
                      Write-Host "${Esc}[33m🚨 CLOUD WEB VIEW SYSTEM IS LIVE 🚨${Esc}[0m"
                      Write-Host "${Esc}[36m###########################################################################${Esc}[0m"
                      Write-Host "${Esc}[32m🌐 DIRECT MOBILE BROWSER LINK:${Esc}[0m"
                      Write-Host "${Esc}[35m$publicUrl${Esc}[0m"
                      Write-Host "${Esc}[36m###########################################################################${Esc}[0m"
                      Write-Host "${Esc}[32m🔑 ACCESS PASSWORD: Pass1234${Esc}[0m"
                      Write-Host "${Esc}[36m###########################################################################${Esc}[0m`n"
                      break
                  }
              } catch {
                  Write-Host "Waiting for web view network synchronization ($i/6)..."
                  Start-Sleep -Seconds 5
              }
          }

      - name: Session Keep Alive Loop
        run: |
          $mins = [int]"${{ inputs.runtime_minutes }}"
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host "Web View Portal Streaming | Heartbeat Live"
            Start-Sleep -Seconds 60
          }

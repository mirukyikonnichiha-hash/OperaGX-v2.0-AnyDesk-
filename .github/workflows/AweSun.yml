name: Opera GX Mobile Rewards Hub (Stable Fix)

on:
  workflow_dispatch:
    inputs:
      runtime_minutes:    { description: "Runtime (max 120)", required: false, default: "60" }
      ngrok_token:        { description: "Paste your free Ngrok Auth Token", required: true }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: pwsh

jobs:
  rewards-engine:
    runs-on: windows-latest
    timeout-minutes: 130

    steps:
      - name: Parse Runtime Requirements
        run: |
          $runtime = [int]"${{ inputs.runtime_minutes }}"
          if ($runtime -gt 120 -or $runtime -lt 1) { $runtime = 60 }
          "RUNTIME_MINUTES=$runtime" | Out-File -Append $env:GITHUB_ENV

      - name: Install Stable Components via Package Manager
        run: |
          Write-Host "Fetching official, verified packages..."
          # 1. Use pre-installed Chocolatey to pull the latest verified Ngrok build
          choco install ngrok -y --no-progress
          
          # 2. Grab TightVNC using a stable, direct vendor distribution link
          Invoke-WebRequest -Uri "https://www.tightvnc.com/download/2.8.85/tightvnc-2.8.85-gpl-setup-64bit.msi" -OutFile "$env:TEMP\vnc.msi"
          Write-Host "Core utilities successfully staged."

      - name: Inject Unattended VNC Password Profile
        run: |
          Write-Host "Configuring silent display service configuration..."
          # Pass explicit installation properties to bypass all interactive setup windows completely
          $msiArgs = @(
              "/i", "`"$env:TEMP\vnc.msi`"",
              "/quiet", "/norestart",
              "SET_USEVNCAUTHENTICATION=1",
              "VALUE_OF_USEVNCAUTHENTICATION=1",
              "SET_PASSWORD=1",
              "VALUE_OF_PASSWORD=ViewerPassword123",
              "SET_USECONTROLAUTHENTICATION=1",
              "VALUE_OF_CONTROLPASSWORD=ViewerPassword123"
          )
          
          Start-Process msiexec.exe -ArgumentList $msiArgs -Wait
          
          # Force service re-initialization to ensure registry parameter persistence
          Restart-Service -Name "tvnserver" -Force -ErrorAction SilentlyContinue
          Write-Host "VNC server authenticated and active in system context."

      - name: Establish Secure Mobile View Tunnel
        env:
          NGROK_AUTH: ${{ inputs.inputs.ngrok_token }}
        run: |
          Write-Host "Provisioning secure edge map network layer..."
          # Register the workflow token profile globally using the choco path setup
          & ngrok authtoken "${{ inputs.ngrok_token }}"
          
          # Route traffic straight through local port 5900
          Start-Process -FilePath "ngrok" -ArgumentList "tcp 5900"
          Start-Sleep -Seconds 8
          
          # Pull real-time connection telemetry from internal diagnostic block
          try {
            $api = Invoke-RestMethod -Uri "http://127.0.0.1:4040/api/tunnels"
            $publicUrl = $api.tunnels[0].public_url
            
            Write-Host "=========================================================="
            Write-Host "SUCCESS! MOBILE VIEWERS CONNECTION DETAILS:"
            Write-Host "1. Download a free VNC Viewer app on your phone."
            Write-Host "2. Target Address: $publicUrl"
            Write-Host "3. System Password: ViewerPassword123"
            Write-Host "=========================================================="
            
            "VIEW_URL=$publicUrl" | Out-File -Append $env:GITHUB_ENV
          } catch {
            Write-Error "Failed to map local network tunnel link: $($_.Exception.Message)"
            exit 1
          }

      - name: Connection Keep-Alive Loop
        run: |
          $mins = [int]$env:RUNTIME_MINUTES
          $end = (Get-Date).AddMinutes($mins)
          while ((Get-Date) -lt $end) {
            Write-Host "Rewards Engine Online | Stream Target: $env:VIEW_URL | Ending at " $end.ToString("HH:mm:ss")
            Start-Sleep -Seconds 60
          }
